<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm danh QR - Giáo xứ Ninh Phát</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; color: #1a73e8; margin-bottom: 4px; }
        .subtitle {
            color: #666; font-size: 13px; margin-bottom: 20px;
            border-left: 3px solid #1a73e8; padding-left: 10px;
        }
        h3 { font-size: 17px; color: #333; margin-bottom: 14px; }

        /* URL box */
        .url-box {
            background: #fff8e1; border: 2px solid #ffcc02;
            border-radius: 12px; padding: 14px; margin-bottom: 16px;
        }
        .url-box.saved { border-color: #34a853; background: #f0fff4; }
        .url-box label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 6px; }
        .url-box input {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 13px; color: #333;
        }
        .url-box input:focus { outline: none; border-color: #1a73e8; }
        .url-save-btn {
            margin-top: 8px; padding: 10px 16px;
            background: #1a73e8; color: white; border: none;
            border-radius: 8px; font-size: 14px; font-weight: bold;
            cursor: pointer; width: 100%;
        }

        /* Mode */
        .mode-selector {
            display: flex; gap: 10px; margin-bottom: 16px;
            background: #f0f2f5; padding: 5px; border-radius: 40px;
        }
        .mode-btn {
            flex: 1; padding: 12px; text-align: center;
            border-radius: 32px; font-weight: bold; cursor: pointer;
            border: none; background: transparent; font-size: 15px;
        }
        .mode-btn.active { background: #1a73e8; color: white; }
        .mode-btn:not(.active) { color: #5f6368; }

        /* Scan button */
        .scan-btn {
            display: block; width: 100%;
            background: linear-gradient(135deg, #1a73e8, #0d5bbd);
            color: white; text-align: center; padding: 20px;
            font-size: 19px; font-weight: bold; border-radius: 48px;
            border: none; cursor: pointer; margin: 12px 0;
        }
        .scan-btn:active { opacity: 0.9; }
        .stop-btn {
            display: none; width: 100%;
            background: #ea4335; color: white; text-align: center;
            padding: 14px; font-size: 15px; font-weight: bold;
            border-radius: 48px; border: none; cursor: pointer; margin: 8px 0;
        }

        /* --- READER: để html5-qrcode tự thêm video vào đây --- */
        #reader {
            display: none;
            width: 100%;
            margin: 12px 0;
            /* KHÔNG đặt overflow:hidden hay border-radius ở đây */
        }
        /* Đảm bảo video bên trong hiển thị đúng kích thước */
        #reader video {
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            border-radius: 16px;
            display: block;
        }
        #reader img { display: none; } /* Ẩn icon mặc định của thư viện */
        /* Ô ngắm vuông ở giữa */
        #reader > div { border-radius: 12px; }

        /* Result */
        .result-box {
            border-radius: 14px; padding: 14px; margin: 12px 0;
            display: none; font-size: 15px; line-height: 1.5;
        }
        .result-box.success { background: #e6f4ea; border-left: 4px solid #34a853; color: #1a7a33; }
        .result-box.error   { background: #fce8e6; border-left: 4px solid #ea4335; color: #c0392b; }
        .result-box.info    { background: #e8f0fe; border-left: 4px solid #1a73e8; color: #1558b0; }

        /* Student card */
        .student-info {
            background: #f8f9fa; border-radius: 14px;
            padding: 16px; margin: 12px 0; display: none;
        }
        .student-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .student-name { font-size: 18px; font-weight: bold; color: #1a1a1a; margin-bottom: 8px; }
        .student-detail { font-size: 14px; color: #444; line-height: 2; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* Attendance list */
        .attendance-item {
            background: #f8f9fa; border-radius: 12px; padding: 12px; margin: 8px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .att-name { font-weight: bold; font-size: 15px; }
        .att-sub  { color: #888; font-size: 12px; margin-top: 2px; }
        .bv { background: #e6f4ea; color: #1e7e34; padding: 4px 9px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .br { background: #e8f0fe; color: #1a73e8; padding: 4px 9px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 4px; }

        .loading { text-align: center; padding: 20px; color: #999; font-size: 14px; }
        canvas { max-width: 100%; max-height: 240px; margin: 12px 0; }
        .stats-text { text-align: center; font-size: 14px; color: #555; margin-top: 8px; }
        .note { font-size: 12px; color: #888; text-align: center; margin-top: 8px; line-height: 2; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid currentColor; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📷 Điểm danh QR</h1>
    <div class="subtitle">Giáo xứ Ninh Phát</div>

    <div class="url-box" id="urlBox">
        <label>🔗 Dán URL Google Apps Script vào đây (chỉ cần làm 1 lần):</label>
        <input type="url" id="scriptUrl" placeholder="https://script.google.com/macros/s/..." autocomplete="off" />
        <button class="url-save-btn" onclick="saveUrl()">💾 Lưu URL</button>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('vao')" id="modeVaoBtn">📥 VÀO LỚP</button>
        <button class="mode-btn" onclick="setMode('ra')" id="modeRaBtn">📤 RA VỀ</button>
    </div>

    <button class="scan-btn" id="scanBtn" onclick="startScanner()">📷 NHẤN ĐỂ QUÉT QR</button>
    <button class="stop-btn"  id="stopBtn" onclick="stopScanner()">⏹ DỪNG CAMERA</button>

    <!-- Thư viện html5-qrcode sẽ inject video vào đây -->
    <div id="reader"></div>

    <div id="resultBox" class="result-box"></div>
    <div id="studentInfo" class="student-info"></div>
</div>

<div class="container">
    <h3>📋 Điểm danh hôm nay</h3>
    <div id="todayList"><div class="loading">⏳ Đang tải...</div></div>
</div>

<div class="container">
    <h3>📊 Thống kê hôm nay</h3>
    <canvas id="chartToday"></canvas>
    <div class="stats-text" id="statsText"></div>
</div>

<div class="container">
    <h3>🏆 Top 5 học viên chuyên cần</h3>
    <canvas id="chartTop"></canvas>
</div>

<div class="note">
    📌 Nhấn <strong>QUÉT QR</strong> → Cho phép camera → Đưa mã QR vào khung vuông<br>
    🔒 Chỉ hoạt động trên HTTPS — GitHub Pages ✅
</div>

<script>
// =========================================================
// URL
// =========================================================
const URL_KEY = 'gasUrl_v3';
let SCRIPT_URL = localStorage.getItem(URL_KEY) || '';

window.addEventListener('DOMContentLoaded', () => {
    if (SCRIPT_URL) {
        document.getElementById('scriptUrl').value = SCRIPT_URL;
        document.getElementById('urlBox').classList.add('saved');
        loadAll();
    }
});

function saveUrl() {
    const val = document.getElementById('scriptUrl').value.trim();
    if (!val.startsWith('https://script.google.com/')) {
        alert('URL không đúng!\nPhải bắt đầu bằng:\nhttps://script.google.com/macros/s/...');
        return;
    }
    SCRIPT_URL = val;
    localStorage.setItem(URL_KEY, val);
    document.getElementById('urlBox').classList.add('saved');
    showResult('✅ Đã lưu URL!', 'success');
    loadAll();
}

// =========================================================
// MODE
// =========================================================
let currentMode = 'vao';
function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeVaoBtn').classList.toggle('active', mode === 'vao');
    document.getElementById('modeRaBtn').classList.toggle('active', mode === 'ra');
}

// =========================================================
// CAMERA — KHÔNG dùng wrapper, inject thẳng vào #reader
// =========================================================
let scanner   = null;
let scanning  = false;
let lastCode  = '';
let lastTime  = 0;

function startScanner() {
    if (scanning) return;

    const readerEl = document.getElementById('reader');

    // Xoá nội dung cũ nếu có
    readerEl.innerHTML = '';
    readerEl.style.display = 'block';

    document.getElementById('scanBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';

    // Tạo scanner mới
    scanner = new Html5Qrcode('reader');

    const qrboxSize = Math.min(250, Math.floor(readerEl.offsetWidth * 0.75) || 250);

    const config = {
        fps: 10,
        qrbox: { width: qrboxSize, height: qrboxSize },
        aspectRatio: 1.333,
        showTorchButtonIfSupported: true
    };

    // Thử camera sau (environment) — camera sau điện thoại
    scanner.start(
        { facingMode: { ideal: 'environment' } },
        config,
        onQrSuccess,
        () => { /* bỏ qua lỗi đọc frame */ }
    ).then(() => {
        scanning = true;
    }).catch(() => {
        // Fallback: thử bất kỳ camera nào
        scanner.start(
            { facingMode: 'user' },
            config,
            onQrSuccess,
            () => {}
        ).then(() => {
            scanning = true;
        }).catch(err => {
            handleCameraError(err);
        });
    });
}

function onQrSuccess(text) {
    const now = Date.now();
    if (text === lastCode && now - lastTime < 3000) return; // chống quét trùng
    lastCode = text;
    lastTime = now;
    if (navigator.vibrate) navigator.vibrate(100);
    const maHV = text.split('\n')[0].trim().toUpperCase();
    if (maHV) processAttendance(maHV);
}

function handleCameraError(err) {
    const e = String(err || '');
    let msg = '❌ Không mở được camera.';
    if (e.includes('Permission') || e.includes('NotAllowed') || e.includes('denied')) {
        msg = '❌ Bị từ chối quyền camera.<br>'
            + '📱 iPhone: Cài đặt → Safari → Camera → Cho phép<br>'
            + '🤖 Android: Cài đặt → Chrome → Quyền → Camera → Cho phép';
    } else if (e.includes('NotFound') || e.includes('DevicesNotFound')) {
        msg = '❌ Không tìm thấy camera trên thiết bị.';
    } else if (e.includes('https') || e.includes('secure')) {
        msg = '❌ Cần HTTPS để mở camera. Mở trang qua GitHub Pages.';
    }
    showResult(msg, 'error');
    stopScanner();
}

function stopScanner() {
    scanning = false;
    document.getElementById('reader').style.display = 'none';
    document.getElementById('scanBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    lastCode = '';
    if (scanner) {
        scanner.stop().catch(() => {});
        scanner.clear();
        scanner = null;
    }
}

// =========================================================
// ĐIỂM DANH
// =========================================================
async function processAttendance(maHV) {
    showResult('<span class="spinner"></span> Đang điểm danh <strong>' + escapeHtml(maHV) + '</strong>...', 'info');

    if (!SCRIPT_URL) {
        showResult('⚠️ Chưa nhập URL Apps Script. Vui lòng dán URL và nhấn Lưu.', 'error');
        return;
    }

    try {
        const url = SCRIPT_URL
            + '?action=attendance'
            + '&maHV=' + encodeURIComponent(maHV)
            + '&mode=' + currentMode;

        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (data.ok) {
            showResult(data.message, 'success');
            if (data.student) showStudentInfo(data.student, data.time, currentMode === 'vao');
            setTimeout(stopScanner, 1500);
            loadTodayAttendance();
        } else {
            showResult(data.message || '❌ Lỗi không xác định', 'error');
        }
    } catch (e) {
        showResult('❌ Lỗi kết nối server. Kiểm tra URL và thử lại.<br><small>' + e + '</small>', 'error');
    }
}

// =========================================================
// HIỂN THỊ
// =========================================================
let rTimer = null;
function showResult(html, type) {
    const b = document.getElementById('resultBox');
    b.innerHTML = html;
    b.className = 'result-box ' + type;
    b.style.display = 'block';
    clearTimeout(rTimer);
    if (type !== 'info') rTimer = setTimeout(() => { b.style.display = 'none'; }, 7000);
}

function showStudentInfo(s, time, isVao) {
    const d = document.getElementById('studentInfo');
    const c = isVao ? '#1e7e34' : '#1a73e8';
    d.innerHTML = `
        <div class="student-top">
            <span style="font-size:26px;">${isVao ? '📥' : '📤'}</span>
            <span class="badge" style="background:${c}18;color:${c};">${isVao ? 'VÀO LỚP' : 'RA VỀ'}</span>
        </div>
        <div class="student-name">${escapeHtml(s.hoTen)}</div>
        <div class="student-detail">
            📛 Mã HV: <strong>${escapeHtml(s.ma)}</strong><br>
            ⛪ Tên Thánh: ${escapeHtml(s.tenThanh)}<br>
            🕐 Thời gian: <strong>${escapeHtml(time)}</strong><br>
            📞 Phụ huynh: ${escapeHtml(s.ph)}
        </div>`;
    d.style.display = 'block';
    setTimeout(() => { d.style.display = 'none'; }, 10000);
}

// =========================================================
// DANH SÁCH HÔM NAY
// =========================================================
async function loadTodayAttendance() {
    if (!SCRIPT_URL) return;
    const el = document.getElementById('todayList');
    el.innerHTML = '<div class="loading">⏳ Đang tải...</div>';
    try {
        const r = await fetch(SCRIPT_URL + '?action=getToday');
        const data = await r.json();
        if (!data || !data.length) {
            el.innerHTML = '<div class="loading">📭 Chưa có điểm danh nào hôm nay</div>';
            return;
        }
        el.innerHTML = data.map(item => `
            <div class="attendance-item">
                <div>
                    <div class="att-name">${escapeHtml(item.hoTen)}</div>
                    <div class="att-sub">${escapeHtml(item.tenThanh)} · ${escapeHtml(item.maHV)}</div>
                </div>
                <div>
                    ${item.gioVao ? `<span class="bv">📥 ${item.gioVao}</span>` : ''}
                    ${item.gioRa  ? `<span class="br">📤 ${item.gioRa}</span>`  : ''}
                </div>
            </div>`).join('');
    } catch (e) {
        el.innerHTML = '<div style="color:red;text-align:center;padding:16px;">❌ Lỗi tải dữ liệu</div>';
    }
}

// =========================================================
// BIỂU ĐỒ
// =========================================================
let cToday, cTop;

async function loadThongKe() {
    if (!SCRIPT_URL) return;
    try {
        const r = await fetch(SCRIPT_URL + '?action=thongKeHomNay');
        const d = await r.json();
        if (cToday) cToday.destroy();
        cToday = new Chart(document.getElementById('chartToday'), {
            type: 'doughnut',
            data: {
                labels: ['Đã đến', 'Vắng mặt', 'Đi muộn'],
                datasets: [{ data: [d.daDen, d.chuaDen, d.diMuon], backgroundColor: ['#34a853','#ea4335','#fbbc04'], borderWidth: 0 }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
        document.getElementById('statsText').innerHTML =
            `✅ Đã đến: <strong>${d.daDen}</strong> &nbsp;|&nbsp; ❌ Vắng: <strong>${d.chuaDen}</strong> &nbsp;|&nbsp; ⏰ Muộn: <strong>${d.diMuon}</strong>`;
    } catch (e) {}

    try {
        const r2 = await fetch(SCRIPT_URL + '?action=thongKeTopHocVien');
        const d2 = await r2.json();
        if (!d2 || !d2.length) return;
        if (cTop) cTop.destroy();
        cTop = new Chart(document.getElementById('chartTop'), {
            type: 'bar',
            data: {
                labels: d2.map(s => s.hoTen),
                datasets: [{ label: 'Số buổi', data: d2.map(s => s.soBuoi), backgroundColor: '#1a73e8', borderRadius: 6 }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    } catch (e) {}
}

function loadAll() { loadTodayAttendance(); loadThongKe(); }

function escapeHtml(str) {
    if (!str) return '';
    return str.toString().replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

window.onload = loadAll;
</script>
</body>
</html>
