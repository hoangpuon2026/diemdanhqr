<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Điểm danh QR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 16px; background: #f0f2f5; }
        .container { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; }
        h1 { font-size: 24px; color: #1a73e8; }
        .mode-selector { display: flex; gap: 12px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 32px; border: none; cursor: pointer; }
        .mode-btn.active { background: #1a73e8; color: white; }
        .scan-btn { display: block; background: #1a73e8; color: white; text-align: center; padding: 18px; border-radius: 48px; text-decoration: none; margin: 16px 0; }
        .result-box, .student-info { display: none; padding: 16px; margin: 16px 0; border-radius: 16px; }
        .result-box.success { background: #e6f4ea; }
        .result-box.error { background: #fce8e6; }
        .attendance-item { background: #f8f9fa; padding: 12px; margin: 8px 0; border-radius: 12px; display: flex; justify-content: space-between; }
        .badge-vao { background: #e6f4ea; color: #1e7e34; padding: 4px 8px; border-radius: 20px; }
        .badge-ra { background: #e8f0fe; color: #1a73e8; padding: 4px 8px; border-radius: 20px; }
        .loading { text-align: center; padding: 20px; color: #888; }
        canvas { max-width: 100%; max-height: 250px; margin: 16px 0; }
        .note { font-size: 11px; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Điểm danh QR</h1>
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('vao')">📥 VÀO LỚP</button>
            <button class="mode-btn" onclick="setMode('ra')">📤 RA VỀ</button>
        </div>
        <a href="intent://scan/#Intent;scheme=zxing;end;" class="scan-btn">📷 NHẤN ĐỂ QUÉT QR</a>
        <div id="resultBox" class="result-box"></div>
        <div id="studentInfo" class="student-info"></div>
    </div>
    <div class="container"><h3>📋 Điểm danh hôm nay</h3><div id="todayList"><div class="loading">Đang tải...</div></div></div>
    <div class="container"><h3>📊 Thống kê hôm nay</h3><canvas id="chartToday"></canvas><div id="statsText" style="text-align:center"></div></div>
    <div class="container"><h3>🏆 Top 5 học viên</h3><canvas id="chartTopStudents"></canvas></div>
    <div class="note">Nhấn nút quét → Chọn Camera → Quét mã QR</div>
    <script>
        let currentMode = 'vao';
        let chartToday, chartTopStudents;
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxi-7ceVzBqClg8QmvvbiQVtEfGZFHqNAhqUBfjypeeEl-iV6SPW346I3miadVHkTVs/exec'; // 👈 THAY URL CỦA BẠN
        
        function setMode(mode) { currentMode = mode; document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active')); document.getElementById(mode === 'vao' ? 'modeVaoBtn' : 'modeRaBtn')?.classList.add('active'); }
        function showResult(msg, isSuccess) { const box = document.getElementById('resultBox'); box.innerHTML = msg; box.className = 'result-box ' + (isSuccess ? 'success' : 'error'); box.style.display = 'block'; setTimeout(() => box.style.display = 'none', 5000); }
        
        async function processAttendance(maHV) {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `action=attendance&maHV=${encodeURIComponent(maHV)}&mode=${currentMode}` });
                showResult(`✅ Đã điểm danh ${currentMode === 'vao' ? 'VÀO' : 'RA'} cho mã: ${maHV}`, true);
                loadTodayAttendance(); loadThongKe();
            } catch(e) { showResult('❌ Lỗi: ' + e.message, false); }
        }
        
        async function loadTodayAttendance() {
            const listEl = document.getElementById('todayList'); listEl.innerHTML = '<div class="loading">Đang tải...</div>';
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getToday`); const data = await res.json();
                if (!data || data.length === 0) { listEl.innerHTML = '<div style="text-align:center;color:#888">📭 Chưa có điểm danh nào</div>'; return; }
                let html = ''; data.forEach(item => { html += `<div class="attendance-item"><div><strong>${item.hoTen}</strong><br><small>${item.maHV}</small></div><div>${item.gioVao ? `<span class="badge-vao">📥 ${item.gioVao}</span>` : ''}${item.gioRa ? `<span class="badge-ra">📤 ${item.gioRa}</span>` : ''}</div></div>`; });
                listEl.innerHTML = html;
            } catch(e) { listEl.innerHTML = '<div style="color:red">❌ Lỗi tải</div>'; }
        }
        
        async function loadThongKe() {
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=thongKeHomNay`); const data = await res.json();
                if (chartToday) chartToday.destroy();
                const ctx = document.getElementById('chartToday').getContext('2d');
                chartToday = new Chart(ctx, { type: 'doughnut', data: { labels: ['Đã đến', 'Vắng mặt', 'Đi muộn'], datasets: [{ data: [data.daDen, data.chuaDen, data.diMuon], backgroundColor: ['#34a853', '#ea4335', '#fbbc04'] }] }, options: { responsive: true } });
                document.getElementById('statsText').innerHTML = `✅ Đã đến: ${data.daDen} | ❌ Vắng: ${data.chuaDen} | ⏰ Đi muộn: ${data.diMuon}`;
            } catch(e) { console.log(e); }
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=thongKeTopHocVien`); const data = await res.json();
                if (chartTopStudents) chartTopStudents.destroy();
                if (data && data.length) { const ctx = document.getElementById('chartTopStudents').getContext('2d'); chartTopStudents = new Chart(ctx, { type: 'bar', data: { labels: data.map(s => s.hoTen), datasets: [{ label: 'Số buổi', data: data.map(s => s.soBuoi), backgroundColor: '#1a73e8' }] }, options: { responsive: true } }); }
            } catch(e) { console.log(e); }
        }
        
        function handleScannedResult() {
            const urlParams = new URLSearchParams(window.location.search);
            let scanned = urlParams.get('qr') || urlParams.get('SCAN_RESULT');
            if (scanned && scanned.trim()) { processAttendance(scanned.split('\n')[0].trim()); window.history.replaceState({}, document.title, window.location.pathname); }
        }
        
        window.onload = function() { loadTodayAttendance(); handleScannedResult(); loadThongKe(); };
    </script>
</body>
</html>
